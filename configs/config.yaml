# ============================================================
# Configuration for Traffic Flow Prediction
# ============================================================

data:
  dataset: "TaxiBJ"
  data_dir: "data/raw/TaxiBJ"
  grid_size: 32            # 32x32 grid
  channels: 2              # inflow + outflow
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1

  # Sliding window parameters
  seq_len: 6               # number of past time steps as input
  horizons: [1, 3, 6]      # prediction horizons (in time steps)
                            # At 30-min intervals: 1=30min, 3=90min, 6=180min

  # External features
  use_time_features: true   # hour-of-day, day-of-week encodings
  use_weather: true         # weather conditions (if available in dataset)
  use_holidays: true        # holiday indicators

model:
  # --- CNN Baseline ---
  cnn:
    channels: [64, 128, 64]
    kernel_size: 3
    dropout: 0.2
    use_residual: true

  # --- ConvLSTM ---
  convlstm:
    hidden_dims: [64, 64]
    kernel_size: 3
    num_layers: 2
    dropout: 0.2

  # --- DINO Enhanced ---
  dino:
    backbone: "dinov2_vits14"    # Options: dinov2_vits14, dinov2_vitb14
    freeze_backbone: true         # Freeze DINO weights (recommended)
    projection_dim: 128           # Project DINO features to this dim
    temporal_hidden: 64
    temporal_layers: 2
    # DINO expects 224x224 RGB; we resize and replicate channels
    input_resize: 224

training:
  batch_size: 32
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: "adam"             # adam, adamw, sgd
  scheduler: "cosine"          # cosine, step, plateau
  scheduler_params:
    T_max: 100
    eta_min: 0.00001
  early_stopping_patience: 15
  gradient_clip: 1.0

evaluation:
  metrics: ["mae", "rmse"]
  peak_hours: [7, 8, 9, 17, 18, 19]   # For peak vs off-peak analysis
  saliency_method: "occlusion"          # occlusion or gradient

output:
  checkpoint_dir: "checkpoints"
  log_dir: "logs"
  results_dir: "results"
  save_best_only: true

seed: 42
device: "auto"   # auto, cuda, cpu
